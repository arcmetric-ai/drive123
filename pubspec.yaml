name: drive_t
description: A friendly platform connecting driving learners with verified instructors in Ontario.

publish_to: 'none'

version: 1.0.0+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  app_links: ^6.4.1
  go_router: ^17.0.0
  
  # State Management
  flutter_riverpod: ^3.0.3
  
  # Backend & Storage
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^6.0.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  
  # UI Components
  flutter_svg: ^2.2.2
  qr_flutter: ^4.1.0
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^1.1.1
  table_calendar: ^3.0.9
  
  # Utilities
  crypto: ^3.0.6
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.2.2
  image_picker: ^1.2.1
  file_picker: ^10.3.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_local_notifications: ^20.1.0
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-ExtraBold.ttf
          weight: 800
    - family: BungeeInline
      fonts:
        - asset: assets/fonts/BungeeInline-Regular.ttf
          weight: 400
    - family: MartianMono
      fonts:
        - asset: assets/fonts/MartianMono-Light.ttf
          weight: 300
        - asset: assets/fonts/MartianMono-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon_simplified.png
  image_path_android: assets/images/app_icon_android_padded.png
  remove_alpha_ios: true
  adaptive_icon_foreground: assets/images/app_icon_android_padded.png
  adaptive_icon_background: "#FFFFFF"
  ios_background_color: "#054ADA"
  
