name: drive_t
description: A friendly platform connecting driving learners with verified instructors in Ontario.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^17.0.0
  
  # State Management
  flutter_riverpod: ^3.0.3
  
  # Backend & Storage
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^6.0.0
  
  # UI Components
  flutter_svg: ^2.2.2
  flutter_staggered_animations: ^1.1.1
  fl_chart: ^1.1.1
  table_calendar: ^3.0.9
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: BungeeInline
      fonts:
        - asset: assets/fonts/BungeeInline-Regular.ttf
          weight: 400
    - family: MartianMono
      fonts:
        - asset: assets/fonts/MartianMono-Light.ttf
          weight: 300
        - asset: assets/fonts/MartianMono-Regular.ttf
          weight: 400

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/drive_t_logo_only.jpeg
  remove_alpha_ios: true
  adaptive_icon_background: "#34C759"
  ios_background_color: "#34C759"
  
